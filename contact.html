<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Discovery<span class="highlight">Infotech</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="curriculum.html">Curriculum</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle">🌙</button>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section class="container section contact-wrapper">
        <h1 class="page-title">Enroll Now</h1>
        <p class="text-center">Secure your spot for the March 1st Batch.</p>

        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe">
                <span class="error-msg" id="nameError"></span>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com">
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="1234567890">
                <span class="error-msg" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="5" name="message" placeholder="I am interested in..."></textarea>
                <span class="error-msg" id="messageError"></span>
            </div>

            <button type="submit" class="btn btn-primary full-width">Submit Application</button>
        </form>
        <div id="formSuccess" class="success-message">
               Application submitted successfully! We will contact you soon.
            </div>
    </section>

    <footer>
        <p>&copy; 2026 Discovery Infotech Institute. All Rights Reserved.</p>
    </footer>

    <script src="js/darkmode.js"></script>
    <script src="js/main.js"></script>
    <script src="js/validation.js"></script> 

    <script src="js/formSubmit.js"></script>
</body>
</html>
