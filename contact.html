<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="icon" type="image/x-icon" href="assests/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Discovery<span class="highlight">Infotech</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="curriculum.html">Curriculum</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle">🌙</button>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section class="container section contact-wrapper">
        <h1 class="page-title">Enroll Now</h1>
        <p class="text-center">Secure your spot for the March 1st Batch of the Web Devlopment Course.</p>

        <form id="contactForm" class="contact-form">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="form-group">
            <label>Education Level</label>

            <select id="education" name="education" required>

            <option value="">Select Qualification</option>
            <option value="school">School (1-10)</option>
            <option value="inter">11th / 12th</option>
            <option value="twelfth_pass">12th Pass</option>
            <option value="graduation">Graduation</option>
            <option value="masters">Masters</option>
            <option value="other">Other</option>

        </select>

        </div>

        <div id="schoolClass" class="conditional">

            <label>Select Class</label>

        <select id="class">

            <option value="">Select</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>

        </select>

        </div>

        <div id="interClass" class="conditional">

            <label>Select</label>

        <select id="inter">

            <option value="">Select</option>
            <option>11th</option>
            <option>12th</option>

        </select>

        </div>

        <div id="gradSubject" class="conditional">

            <label>Graduation Subject</label>

            <input type="text" id="grad_subject">

        </div>

        <div id="masterSubject" class="conditional">

            <label>Masters Subject</label>

            <input type="text" id="master_subject">

        </div>

        <div id="otherField" class="conditional">

            <label>What are you doing?</label>

            <input type="text" id="other">

        </div>
        
    <button type="submit" class="btn btn-primary full-width">

        Submit Application

    </button>
        
 </form>
       <div id="formSuccess" class="success-message">
               Application submitted successfully! We will contact you soon.
            </div> 
    </section>

    <footer>
        <p>&copy; 2026 Discovery Infotech Institute. All Rights Reserved.</p>
    </footer>

    <script src="js/darkmode.js"></script>
    <script src="js/main.js"></script>
    <script src="js/validation.js"></script> 

    <script src="js/formSubmit.js"></script>
</body>
</html>
